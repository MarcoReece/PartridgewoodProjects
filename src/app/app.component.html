<div class="wrapper">
  <div id="content">
    <nav id="navbar" class="d-flex align-items-center justify-content-between">
      <ul id="nav-items-lg" class="d-flex m-0 list-unstyled align-items-center">
        <li class="me-4">
          <a (click)="homeReload()" class="d-block">
            <img
              src="assets/pictures/PWPlogo.png"
              alt="Partridgewood Projects Logo"
              class="logo-image"
            />
          </a>
        </li>
        <li>
          <a class="unstyle-link" routerLink="home" routerLinkActive="active-route">Home</a>
        </li>
        <li>
          <a class="unstyle-link" routerLink="services" routerLinkActive="active-route">Services</a>
        </li>
        <li>
          <a class="unstyle-link" routerLink="photos" routerLinkActive="active-route">Photos</a>
        </li>
        <li>
          <a class="unstyle-link" routerLink="about" routerLinkActive="active-route">About us</a>
        </li>
      </ul>
      <button routerLink="contact" id="contact-button" class="btn">
        <a class="unstyle-link">Free Quote</a>
      </button>

      <ul id="nav-items-sm" class="m-0 list-unstyled align-items-center justify-content-between d-none w-100">
        <li>
          <a (click)="homeReload()">
            <img
              src="assets/pictures/PWPlogo.png"
              alt="Partridgewood Projects Logo"
              class="logo-image"
            />
          </a>
        </li>
        <li>
          <div class="dropdown dropstart">
            <div
              class="cursor-pointer"
              id="nav-items-dropdown"
              data-bs-toggle="dropdown"
              aria-expanded="false"
            >
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#334155" stroke-width="2" stroke-linecap="round">
                <line x1="3" y1="6" x2="21" y2="6"/>
                <line x1="3" y1="12" x2="21" y2="12"/>
                <line x1="3" y1="18" x2="21" y2="18"/>
              </svg>
            </div>
            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="nav-items-dropdown">
              <li><a class="dropdown-item" routerLink="home" routerLinkActive="nav-menu-active">Home</a></li>
              <li><a class="dropdown-item" routerLink="services" routerLinkActive="nav-menu-active">Services</a></li>
              <li><a class="dropdown-item" routerLink="about" routerLinkActive="nav-menu-active">About us</a></li>
              <li><a class="dropdown-item" routerLink="photos" routerLinkActive="nav-menu-active">Photos</a></li>
              <li><a class="dropdown-item" routerLink="contact" routerLinkActive="nav-menu-active">Contact us</a></li>
            </ul>
          </div>
        </li>
      </ul>
    </nav>

    <div id="outlet">
      <router-outlet></router-outlet>

      <a
        id="whatsappIcon"
        href="https://api.whatsapp.com/send?phone=27614284712"
        target="_blank"
        rel="noopener"
        aria-label="Message Partridgewood Projects on WhatsApp"
      >
        <img
          *ngIf="showFloatingImage"
          id="floating-image"
          title="Chat with us on WhatsApp"
          src="assets/pictures/WhatsApp.svg.png"
          alt="WhatsApp"
        />
      </a>
    </div>
  </div>

  <footer id="footer">
    <nav aria-label="Footer">
      <a routerLink="home">Home</a>
      <a routerLink="services">Services</a>
      <a routerLink="photos">Photos</a>
      <a routerLink="about">About Us</a>
      <a routerLink="contact">Contact Us</a>
    </nav>
    <div class="text-center">
      <small style="color: rgba(255,255,255,0.5); font-size: 0.8rem; letter-spacing: 0.5px;">
        &copy; 2026 Partridgewood Projects. All rights reserved.
      </small>
    </div>
  </footer>
</div>
